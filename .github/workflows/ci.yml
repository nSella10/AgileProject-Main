name: CI – Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend unit / integration tests (Jest) ──────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          MONGO_URI_TEST: mongodb://localhost:27017/guessify_test
          DISABLE_EXTERNAL_APIS: "true"
        run: npm test -- --passWithNoTests

  # ── Playwright E2E tests ─────────────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm ci || npm install

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Install create-app dependencies
        working-directory: create-app
        run: npm ci || npm install

      - name: Install marketing-website dependencies
        working-directory: marketing-website
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: true
          MONGO_URI: mongodb://localhost:27017/guessify_e2e_test
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
